services:
  db:
    image: mysql:8.4
    container_name: bodega_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bodega_curso
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api_curso
      dockerfile: Dockerfile
    container_name: bodega_api
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: true # Cambiado a true para desarrollo local
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: bodega_curso
      DB_USERNAME: app
      DB_PASSWORD: secret
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      PHP_CLI_SERVER_WORKERS: 8
      LOG_LEVEL: debug # Cambiado a debug para ver logs completos si es necesario
      
      # --- AGREGADO PARA XDEBUG 3 ---
      XDEBUG_MODE: "debug"
      XDEBUG_CONFIG: "client_host=host.docker.internal client_port=9003 start_with_request=yes"
    extra_hosts:
      # Permite que el contenedor apunte a tu sistema operativo host (VS Code)
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api_curso:/var/www/html
    # Quitamos config:cache y route:cache para evitar problemas en desarrollo
    command: >-
      sh -c "php artisan key:generate --force && php artisan migrate --force && php artisan config:clear && php artisan route:clear && PHP_CLI_SERVER_WORKERS=8 php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend_curso
      dockerfile: Dockerfile
    container_name: bodega_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend_curso:/app
      - /app/node_modules
    command: >-
      sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  mysql_data: